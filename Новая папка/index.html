<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Очень важный вопрос 💍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #ff6b9d;
      --rose-dark: #e84a7f;
      --gold: #ffd166;
      --cream: #fff5f7;
      --text: #4a2040;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffeef3 0%, #ffd6e8 40%, #ffc4dd 70%, #ffb3d1 100%);
      color: var(--text);
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.25;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .emoji-top {
      font-size: 3.5rem;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      background: linear-gradient(120deg, var(--rose-dark), #c9185a, var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 2rem;
      max-width: 420px;
    }

    #message {
      min-height: 2.5rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--rose-dark);
      margin-bottom: 2rem;
      padding: 0 1rem;
      transition: opacity 0.3s;
    }

    .buttons-area {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 1rem 2.2rem;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-yes {
      background: linear-gradient(135deg, #ff6b9d, #e84a7f);
      color: white;
      box-shadow: 0 8px 30px rgba(232, 74, 127, 0.45);
      z-index: 10;
      position: relative;
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(232, 74, 127, 0.55);
    }

    .btn-no {
      background: linear-gradient(135deg, #b8b8b8, #8a8a8a);
      color: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      position: fixed;
      z-index: 100;
      transition: left 0.15s ease-out, top 0.15s ease-out;
      white-space: nowrap;
    }

    .btn-no:hover {
      transform: none;
    }

    /* Success screen */
    .success-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: linear-gradient(135deg, #ffeef3, #ffc4dd);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .success-screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .success-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: var(--rose-dark);
      margin-bottom: 1rem;
    }

    .success-screen p {
      font-size: 1.2rem;
      max-width: 500px;
      line-height: 1.6;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 201;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      opacity: 0.5;
      z-index: 5;
    }

    @media (max-width: 480px) {
      .buttons-area { height: 160px; }
      .btn { font-size: 1rem; padding: 0.85rem 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="container" id="mainScreen">
    <div class="emoji-top">💕</div>
    <h1>Ты станешь моей женой?</h1>
    <p class="subtitle">Это не шутка. Это самый серьёзный вопрос в моей жизни.</p>
    <p id="message">Выбери ответ честно... ну или попробуй 😊</p>

    <div class="buttons-area">
      <button class="btn btn-yes" id="btnYes">Да! 💍</button>
    </div>
  </div>

  <button class="btn btn-no" id="btnNo">Нет</button>

  <p class="hint" id="hint">подсказка: «нет» не любит, когда к нему подходят</p>

  <div class="success-screen" id="successScreen">
    <div style="font-size: 5rem; margin-bottom: 1rem;">🥰💍🎉</div>
    <h2>Ура! Ты сказала ДА!</h2>
    <p>Теперь официально: ты — моя будущая жена. Я люблю тебя больше всего на свете. ❤️</p>
  </div>

  <script>
    const btnNo = document.getElementById('btnNo');
    const btnYes = document.getElementById('btnYes');
    const message = document.getElementById('message');
    const hint = document.getElementById('hint');
    const successScreen = document.getElementById('successScreen');
    const mainScreen = document.getElementById('mainScreen');

    const noMessages = [
      'Эй, куда ты?! «Нет» не настроено на разговоры 😤',
      'Нет — это не вариант. Буквально.',
      'Погоди... ты серьёзно пытаешься нажать «нет»?',
      'Кнопка «нет» ушла в отпуск. Вернись к «да».',
      'Я спрашивал про жену, а не про квест «поймай кнопку».',
      'Твоя мышка быстрая, но моё «да» красивее 💕',
      '«Нет» сбежало. Совпадение? Не думаю.',
      'Может, просто нажмёшь «Да»? Там тепло и обнимашки.',
      'Эта кнопка боится твоего курсора. Как и я — твоего «нет».',
      'Попытка №... уже потерял счёт. Ответ всё тот же: ДА!',
      'Ты не поймаешь «нет». Оно уже в другой галактике.',
      'Секрет: «нет» — это кнопка-миф. Есть только «да».',
      'Если бы «нет» могло говорить, оно бы сказало: «нажми да».',
      'Ты упорная. Мне это нравится. Но жена — всё равно ты.',
      'Окей, хватит гоняться. Я жду «да» с 2019... шучу, с секунды назад.',
      '«Нет» устало бегать. Давай отдохнём и поженимся?',
      'Поймала! ...шутка, не поймала. Попробуй «Да» — там 100% попадание.',
      'Мой программист (это я) заблокировал ветку «нет».',
      'Ты как Том, а «нет» как Джерри. Только победа за «Да».',
      'Последнее предупреждение: «нет» обижается и улетает ещё дальше.',
    ];

    const noLabels = [
      'Нет', 'Не-а', 'Ну нет', 'Подумаю', 'Может позже',
      'Не уверена', 'Нет ❌', 'Отказ', 'Не сейчас', 'Пас',
      'Никогда', 'Не хочу', 'Нет!!!', 'Увы', 'Нетушки',
    ];

    let messageIndex = 0;
    let labelIndex = 0;
    let escapeCount = 0;
    let noPositioned = false;

    // Floating hearts background
    const heartsBg = document.getElementById('heartsBg');
    const heartChars = ['💕', '💖', '💗', '💓', '❤️', '💘'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'floating-heart';
      h.textContent = heartChars[i % heartChars.length];
      h.style.left = Math.random() * 100 + '%';
      h.style.animationDuration = (8 + Math.random() * 12) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      h.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
      heartsBg.appendChild(h);
    }

    function getButtonSize() {
      const rect = btnNo.getBoundingClientRect();
      return { w: rect.width, h: rect.height };
    }

    function positionNoButton(initial = false) {
      const { w, h } = getButtonSize();
      const padding = 16;
      const maxX = window.innerWidth - w - padding;
      const maxY = window.innerHeight - h - padding;
      const minX = padding;
      const minY = padding;

      let x, y;

      if (initial) {
        // Start near the yes button area (center-bottom)
        const yesRect = btnYes.getBoundingClientRect();
        x = yesRect.right + 24;
        y = yesRect.top;
        if (x > maxX) x = maxX;
      } else {
        // Random position, avoid being too close to cursor
        const attempts = 30;
        const mouseX = lastMouseX;
        const mouseY = lastMouseY;
        const safeRadius = 120;

        for (let i = 0; i < attempts; i++) {
          x = minX + Math.random() * (maxX - minX);
          y = minY + Math.random() * (maxY - minY);
          const cx = x + w / 2;
          const cy = y + h / 2;
          const dist = Math.hypot(cx - mouseX, cy - mouseY);
          if (dist > safeRadius) break;
        }
      }

      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
      noPositioned = true;
    }

    let lastMouseX = window.innerWidth / 2;
    let lastMouseY = window.innerHeight / 2;

    document.addEventListener('mousemove', (e) => {
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      if (!noPositioned) return;

      const rect = btnNo.getBoundingClientRect();
      const btnCenterX = rect.left + rect.width / 2;
      const btnCenterY = rect.top + rect.height / 2;
      const dist = Math.hypot(e.clientX - btnCenterX, e.clientY - btnCenterY);

      if (dist < 100) {
        flyAway();
      }
    });

    function flyAway() {
      escapeCount++;
      positionNoButton(false);

      message.textContent = noMessages[messageIndex % noMessages.length];
      messageIndex++;

      labelIndex++;
      btnNo.textContent = noLabels[labelIndex % noLabels.length];

      // Make yes button slightly bigger each escape
      const scale = 1 + Math.min(escapeCount * 0.04, 0.5);
      btnYes.style.transform = `scale(${scale})`;

      if (escapeCount >= 3) {
        hint.textContent = '«нет» явно стесняется. «да» — нет 😏';
      }
      if (escapeCount >= 8) {
        hint.style.opacity = '0';
      }
    }

    btnNo.addEventListener('mouseenter', flyAway);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      flyAway();
    }, { passive: false });

    btnNo.addEventListener('click', (e) => {
      e.preventDefault();
      flyAway();
      message.textContent = 'Клик по «нет» не засчитывается! Только «Да» имеет силу закона 💍';
    });

    btnYes.addEventListener('click', () => {
      mainScreen.style.display = 'none';
      btnNo.style.display = 'none';
      hint.style.display = 'none';
      successScreen.classList.add('active');
      launchConfetti();
      document.title = 'Она сказала ДА! 💍';
    });

    function launchConfetti() {
      const colors = ['#ff6b9d', '#ffd166', '#e84a7f', '#ff9ecd', '#c9185a', '#fff'];
      for (let i = 0; i < 120; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-10px';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          c.style.width = (6 + Math.random() * 8) + 'px';
          c.style.height = (6 + Math.random() * 8) + 'px';
          c.style.animationDuration = (2 + Math.random() * 3) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 5000);
        }, i * 25);
      }
    }

    window.addEventListener('resize', () => {
      if (noPositioned) positionNoButton(false);
    });

    // Initial position after layout
    requestAnimationFrame(() => {
      positionNoButton(true);
    });
  </script>
</body>
</html>
